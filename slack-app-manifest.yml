_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Threadflow
  description: Turn Slack conversations into actionable work. Stop losing tasks in the noise.
  background_color: "#1a1d21"
  long_description: |
    Threadflow turns Slack threads into tracked tasks — without leaving Slack.

    Right-click any message, hit "Add to Board", and it becomes a Kanban card on your
    App Home board. Move it through Backlog → In Progress → Waiting → Done with one click.
    No copy-pasting into Jira. No saved-for-later graveyards. No missed follow-ups.

    Features:
    • "Add to Board" message shortcut — one click from any channel or DM
    • Personal Kanban board in your App Home tab
    • One-click status transitions (Start, Wait, Done, Reopen)
    • Every card links back to the original Slack message
    • Delete tasks with confirmation dialog
    • Instant ephemeral confirmation when a task is created
    • Board refreshes automatically after every action

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
    messages_tab_read_only_enabled: false

  shortcuts:
    - name: Add to Board
      type: message
      callback_id: add_to_board
      description: Add this message as a task on your Kanban board

  bot_user:
    display_name: Threadflow
    always_online: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - chat:write.public
      - commands
      - groups:history
      - im:history
      - mpim:history
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_home_opened

  interactivity:
    is_enabled: true

  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
